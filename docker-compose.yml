# ========================================
# 营销CRM系统 - Docker Compose 一键部署
# ========================================
# 启动：docker-compose up -d
# 停止：docker-compose down
# 查看日志：docker-compose logs -f

version: '3.8'

services:
  crm:
    build: .
    container_name: marketing-crm
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # 持久化数据库文件（防止容器重启数据丢失）
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-key}
      - DATABASE_PATH=/app/data/marketing.db
      - PORT=5000
      - FLASK_DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
