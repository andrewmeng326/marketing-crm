<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 营销人员信息管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-left">
            <div class="login-brand">
                <div class="brand-icon">M</div>
                <h1>营销人员信息管理系统</h1>
                <p>Engineering Marketing CRM</p>
            </div>
            <div class="login-features">
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div>
                        <h3>客户全生命周期管理</h3>
                        <p>业主、设计、施工、供应商、运营方分类管理</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <div>
                        <h3>跟进记录实时追踪</h3>
                        <p>电话、拜访、会议记录一目了然</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/>
                        </svg>
                    </div>
                    <div>
                        <h3>数据统计可视化</h3>
                        <p>维系等级、客户分布、待办提醒</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-wrapper">
                <div class="login-form-header">
                    <h2>欢迎登录</h2>
                    <p>请输入您的账号和密码</p>
                </div>

                {% if error %}
                <div class="login-error">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}" class="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" name="username" placeholder="请输入用户名" required autofocus
                                   value="{{ request.form.username if request.form else '' }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" name="password" id="password" placeholder="请输入密码" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember"> 记住我
                        </label>
                    </div>
                    <button type="submit" class="btn-login">登 录</button>
                </form>

                <div class="login-hint">
                    <div class="hint-title">默认账号</div>
                    <div class="hint-items">
                        <div class="hint-item">
                            <span class="hint-tag hint-tag-admin">管理员</span>
                            <span>admin / admin123</span>
                        </div>
                        <div class="hint-item">
                            <span class="hint-tag hint-tag-staff">营销员</span>
                            <span>sales01 / sales123</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="login-footer">
                <p>&copy; 2025 营销人员信息管理系统 · 工程营销数字化管理平台</p>
            </div>
        </div>
    </div>

    <script>
    function togglePassword() {
        var pwd = document.getElementById('password');
        var icon = document.getElementById('eye-icon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            pwd.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
    </script>
</body>
</html>
